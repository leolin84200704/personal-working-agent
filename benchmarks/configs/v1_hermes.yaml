# v1 Hermes — vector + FTS5 hybrid retrieval + claude-cli LLM answer.
#
# Hybrid retrieval rationale: v0 vector-only retrieval scored well on
# multi-hop / open-domain (semantic paraphrases help) but tanked on
# temporal / single-hop questions where the answer is literally a date,
# name, or number. SQLite FTS5 with BM25 ranking handles those keyword-
# exact lookups much better. Union-dedup keeps both signals and lets the
# downstream LLM pick.

name: v1_hermes
description: |
  Hermes-flavored config — vector + FTS5 hybrid retrieval + claude-cli
  LLM answer. Per-sample sandboxes for both Chroma and SQLite ensure no
  cross-sample leakage. Merge strategy is union+dedup (no weighting) so
  we avoid premature score-tuning before we have signal.

memory:
  collection: conversations
  top_k: 5
  embedding_model: all-MiniLM-L6-v2

retrieval:
  api: hybrid_chroma_fts5
  collection: conversations
  top_k_vector: 5
  top_k_fts: 5
  merge_strategy: union_dedup    # 兩邊結果去重 union

rerank:
  enabled: false

answer:
  method: claude_cli
  model: claude-sonnet-4-6
  max_tokens: 100
  timeout: 60

judge:
  metrics: [f1, bleu1, rougeL]
  llm_judge_enabled: false   # 後續用 re_judge.py 補

scoring:
  string_metrics: [f1, bleu1, rougeL]
  llm_judge_enabled: false
  llm_judge_model: null
